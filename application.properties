# 配置示例（请修改为你的配置）

# 方式1: 仅代理 (sing-box + Argo)
install=paper-name="JP" paper-argo="vless-ws" paper-hy2-port="25565"

# 方式2: ttyd 终端 + 独立 Argo 隧道 (临时域名)
install=paper-name="JP" paper-ttyd="true" gist-id="你的GistID" gh-token="你的Token"

# 方式3: ttyd 终端 + 独立 Argo 隧道 (固定隧道)
install=paper-name="JP" paper-ttyd="true" ttyd-argo-auth="你的ArgoToken" gist-id="你的GistID" gh-token="你的Token"

# 方式4: SSHX 终端 (sshx.io直连，无需Argo)
install=paper-name="JP" paper-sshx="true" gist-id="你的GistID" gh-token="你的Token"

# 方式5: 双终端 (ttyd + SSHX 同时启用)
install=paper-name="JP" paper-ttyd="true" paper-sshx="true" ttyd-argo-auth="你的ArgoToken" gist-id="你的GistID" gh-token="你的Token"
