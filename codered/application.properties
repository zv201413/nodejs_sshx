# CodeRed Cloud LITE_MODE 配置
# 所有配置也可通过 Dashboard 环境变量设置，优先级：环境变量 > application.properties
#
# LITE_MODE=true 时仅运行 Express + 可选 ttyd + cloudflared

LITE_MODE=true

# ttyd 网页终端配置
# 留空则不启用 ttyd
ENABLE_TTYD=true

# ttyd Argo 隧道凭证（固定隧道）
# 格式: base64 编码的 Cloudflare Tunnel token / JSON 凭证
# 留空则使用临时隧道（重启更换域名）
ttyd-argo-auth=eyJhIjoiMTZjY2U0NmQ3MjAyZjZhMWMzNzc0NTQwZTU0ZjQzN2QiLCJ0IjoiMmE5YmZiMzAtYzMwNi00MTIyLTkwYWUtZDJiMzQwZjYyODM4IiwicyI6Ik16WXpNREpqTm1VdE1ESTFZeTAwTmpRd0xXRmxOekV0TmpoaFptVTBOamxsT1RaaSJ9

# ttyd 登录凭证
# 格式: 端口:用户名:密码 （如 7681:admin:123456）
# 留空则无认证
ttyd-credential=8001:ttyd:ttyd123

# Hysteria2 Realm P2P 模式
# 启用后 Hysteria2 server 通过 realm 牵线服务器注册，实现 NAT 穿透
HYSTERIA_ENABLED=true

# Hysteria2 验证密码（客户端连接时使用）
HYSTERIA_PASSWORD=hy123

# Realm 牵线服务器地址（默认官方公共服务器）
HYSTERIA_REALM_SERVER=public@realm.hy2.io

# Realm 名称（留空自动生成。6-64字符，字母/数字/-/_）
HYSTERIA_REALM_NAME=

# 节点名称（可选，用于显示）
NAME=CodeRed

# GitHub Gist 同步（可选）
# gist-id=你的GistID
# gh-token=你的GitHubToken
